<!DOCTYPE html>
<html lang='it'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1.0'>
<title>Interrogazione AI · Maria</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}html{font-family:Segoe UI,Arial,sans-serif;background:#101820;color:#eee}body{min-height:100vh}.hdr{position:sticky;top:0;z-index:5;background:#152638;border-bottom:1px solid rgba(255,255,255,.1);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{font-weight:900;color:#fff}.brand span{color:#f8d84a}.back{display:none;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:#eee;border-radius:8px;padding:7px 10px;font:inherit;font-size:.78rem;cursor:pointer}.main{max-width:920px;margin:0 auto;padding:18px 14px 28px}.panel{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.045);border-radius:12px;padding:16px;margin-bottom:12px}.panel h2{font-size:1rem;margin-bottom:8px}.muted{color:rgba(255,255,255,.55);font-size:.82rem;line-height:1.45;margin-bottom:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(142px,1fr));gap:9px}.choice{border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.055);color:#eee;border-radius:10px;padding:11px;text-align:left;font:inherit;cursor:pointer;min-height:74px}.choice:hover{border-color:rgba(248,216,74,.5)}.choice.sel{border-color:#f8d84a;background:rgba(248,216,74,.1);color:#f8d84a}.ico{font-size:1.25rem;margin-bottom:4px}.nm{font-weight:800;font-size:.86rem}.sub{font-size:.68rem;color:rgba(255,255,255,.45);margin-top:3px;line-height:1.25}.choice.sel .sub{color:rgba(248,216,74,.65)}.levels{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.pin{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:9px;color:#fff;padding:12px 14px;text-align:center;font:1.05rem Consolas,monospace;letter-spacing:4px;outline:none}.pin:focus{border-color:#f8d84a}.start{width:100%;border:0;background:#f8d84a;color:#11243a;border-radius:10px;padding:14px;font-weight:900;font-size:1rem;cursor:pointer}.err{display:none;background:rgba(180,35,24,.2);border:1px solid rgba(180,35,24,.45);color:#ffb4ac;border-radius:9px;padding:10px 12px;font-size:.84rem;margin-bottom:12px}.meta{display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;color:rgba(255,255,255,.62);font-size:.8rem}.tag{color:#f8d84a;font-weight:800}.bar{height:6px;background:rgba(255,255,255,.08);border-radius:20px;overflow:hidden;margin-bottom:10px}.fill{height:100%;width:0;background:#f8d84a;border-radius:20px;transition:width .25s}.dots{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.16)}.dot.done{background:#4ade80}.dot.cur{background:#f8d84a}.chat{display:flex;flex-direction:column;gap:10px;min-height:300px;max-height:52vh;overflow:auto;padding:2px 2px 10px}.bub{max-width:90%;border-radius:14px;padding:11px 13px;line-height:1.55;font-size:.92rem;white-space:pre-wrap}.prof{align-self:flex-start;background:rgba(56,120,171,.22);border:1px solid rgba(56,120,171,.38);border-bottom-left-radius:4px}.stu{align-self:flex-end;background:rgba(74,222,128,.13);border:1px solid rgba(74,222,128,.28);border-bottom-right-radius:4px}.sys{align-self:center;background:rgba(255,255,255,.06);color:rgba(255,255,255,.65);font-size:.8rem}.sender{font-size:.68rem;font-weight:900;margin-bottom:4px;color:#8bc7f2}.inputbox{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.045);border-radius:12px;padding:10px}.row{display:flex;gap:9px;align-items:flex-end}.ta{flex:1;min-height:42px;max-height:130px;resize:none;background:transparent;border:0;outline:0;color:#fff;font:inherit;line-height:1.45}.send{border:0;background:#f8d84a;color:#11243a;border-radius:9px;padding:10px 14px;font-weight:900;cursor:pointer}.send:disabled{background:#333;color:#777;cursor:wait}.reportScore{text-align:center;font-size:4.4rem;font-weight:950;line-height:1;margin:10px 0}.reportSub{text-align:center;color:rgba(255,255,255,.55);margin-bottom:16px}.rsec{margin-top:12px}.rlab{font-weight:900;font-size:.73rem;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;color:#f8d84a}.rbody{line-height:1.55;color:#ddd;font-size:.9rem}@media(max-width:560px){.levels{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.main{padding:12px 10px}.bub{max-width:96%}}
</style>
</head>
<body>
<header class='hdr'><div class='brand'>Interrogazione <span>AI</span> · Maria</div><button class='back' id='backBtn' onclick='goSetup()'>Ricomincia</button></header>
<main class='main'>
<section id='setupView'>
  <div class='panel'><h2>Materia</h2><p class='muted'>Scegli prima la materia, poi l’argomento specifico. Il percorso cambia lato server.</p><div class='grid' id='subjectsGrid'></div></div>
  <div class='panel'><h2>Argomento</h2><div class='grid' id='topicsGrid'></div></div>
  <div class='panel'><h2>Livello</h2><div class='levels' id='levelsGrid'></div></div>
  <div class='panel'><h2>Codice</h2><input class='pin' id='pinInput' type='password' placeholder='••••••••' maxlength='24'></div>
  <div class='err' id='errorBox'></div><button class='start' onclick='startExam()'>Inizia interrogazione</button>
</section>
<section id='examView' style='display:none'>
  <div class='panel'><div class='meta'><div><span class='tag' id='metaSubject'></span> · <span id='metaTopic'></span> · <span id='metaLevel'></span></div><div id='examStatus'></div></div><div class='bar'><div class='fill' id='progressFill'></div></div><div class='dots' id='stepDots'></div><div class='chat' id='chatBox'></div><div class='inputbox'><div class='row'><textarea class='ta' id='answerInput' rows='2' placeholder='Scrivi la risposta...' onkeydown='keySend(event)'></textarea><button class='send' id='sendBtn' onclick='sendAnswer()'>Invia</button></div></div></div>
</section>
<section id='reportView' style='display:none'><div class='panel'><div class='reportScore' id='scoreBox'>—</div><div class='reportSub' id='reportSub'></div><div id='reportBody'></div></div><button class='start' onclick='goSetup()'>Nuova interrogazione</button></section>
</main>
<script>
const API_URL='https://zibubwrntdmdxyimqddo.supabase.co/functions/v1/maria-chat';
const E={setup:document.getElementById('setupView'),exam:document.getElementById('examView'),report:document.getElementById('reportView'),subjects:document.getElementById('subjectsGrid'),topics:document.getElementById('topicsGrid'),levels:document.getElementById('levelsGrid'),pin:document.getElementById('pinInput'),err:document.getElementById('errorBox'),back:document.getElementById('backBtn'),metaSubject:document.getElementById('metaSubject'),metaTopic:document.getElementById('metaTopic'),metaLevel:document.getElementById('metaLevel'),status:document.getElementById('examStatus'),fill:document.getElementById('progressFill'),dots:document.getElementById('stepDots'),chat:document.getElementById('chatBox'),answer:document.getElementById('answerInput'),send:document.getElementById('sendBtn'),score:document.getElementById('scoreBox'),reportSub:document.getElementById('reportSub'),reportBody:document.getElementById('reportBody')};
const SUBJECTS={italiano:{icon:'🇮🇹',name:'Italiano',sub:'testi, grammatica, orale',topics:{narrativo:['📖','Narrativo','struttura, narratore'],descrittivo:['🖼️','Descrittivo','5 sensi, registro'],argomentativo:['💬','Argomentativo','tesi, argomenti'],grammatica:['📐','Grammatica','verbi, accenti, analisi'],lessico:['📚','Lessico','sinonimi, stile'],produzione:['✏️','Produzione','scaletta, tema'],analisi:['🔍','Analisi testo','esplicito, implicito'],autori:['🏛️','Autori','opere, contesto'],orale:['🎙️','Orale esame','esposizione lunga']}},inglese:{icon:'🇬🇧',name:'Inglese',sub:'grammar, reading, speaking',topics:{grammar:['📐','Grammar','tenses, conditionals'],vocabulary:['📚','Vocabulary','words, collocations'],writing:['✏️','Writing','email, essay'],reading:['🔍','Reading','comprehension'],speaking:['🎙️','Speaking','fluency, answers'],orale:['🏁','Orale esame','exam simulation']}},spagnolo:{icon:'🇪🇸',name:'Spagnolo',sub:'gramática, comprensión, oral',topics:{grammar:['📐','Gramática','ser/estar, verbos'],vocabulary:['📚','Vocabulario','palabras, falsos amigos'],writing:['✏️','Escritura','texto, carta'],reading:['🔍','Comprensión','lectura'],speaking:['🎙️','Expresión oral','presentación'],orale:['🏁','Orale esame','simulación']}},matematica:{icon:'📊',name:'Matematica',sub:'metodo, calcolo, orale',topics:{algebra:['𝑥','Algebra','equazioni, sistemi'],geometria:['📐','Geometria','figure, teoremi'],statistica:['📊','Statistica','media, probabilità'],funzioni:['📈','Funzioni','grafici, rette'],problemi:['🧩','Problem solving','dati, incognita'],orale:['🎙️','Orale esame','spiegare concetti']}}};
const LEVELS={base:['🟢','Base','6 step · guidato'],medio:['🟡','Medio','10 step · esame'],difficile:['🔴','Difficile','14 step · severo']};const STEP_COUNT={base:6,medio:10,difficile:14};
let subject='italiano',topic='narrativo',level='medio',pin='',history=[],step=0,total=10,loading=false;
function init(){renderSubjects();renderTopics();renderLevels()}init();
function renderSubjects(){E.subjects.innerHTML=Object.entries(SUBJECTS).map(([id,s])=>button('subj',id,s.icon,s.name,s.sub,id===subject)).join('')}
function renderTopics(){const t=SUBJECTS[subject].topics;if(!t[topic])topic=Object.keys(t)[0];E.topics.innerHTML=Object.entries(t).map(([id,x])=>button('topic',id,x[0],x[1],x[2],id===topic)).join('')}
function renderLevels(){E.levels.innerHTML=Object.entries(LEVELS).map(([id,x])=>button('level',id,x[0],x[1],x[2],id===level)).join('')}
function button(kind,id,ico,name,sub,sel){return `<button class='choice ${sel?'sel':''}' onclick='choose(&quot;${kind}&quot;,&quot;${id}&quot;)'><div class='ico'>${ico}</div><div class='nm'>${name}</div><div class='sub'>${sub}</div></button>`}
function choose(kind,id){if(kind==='subj'){subject=id;topic=Object.keys(SUBJECTS[subject].topics)[0];renderSubjects();renderTopics()}if(kind==='topic'){topic=id;renderTopics()}if(kind==='level'){level=id;renderLevels()}}
function show(name){E.setup.style.display=name==='setup'?'block':'none';E.exam.style.display=name==='exam'?'block':'none';E.report.style.display=name==='report'?'block':'none';E.back.style.display=name==='setup'?'none':'block';scrollTo(0,0)}
function showError(msg){E.err.textContent='⚠️ '+msg;E.err.style.display='block'}function clearError(){E.err.style.display='none'}
async function startExam(){clearError();pin=E.pin.value.trim().toUpperCase();if(!pin)return showError('Inserisci il codice.');history=[{role:'user',content:'Inizia l interrogazione.'}];step=0;total=STEP_COUNT[level];E.metaSubject.textContent=SUBJECTS[subject].name;E.metaTopic.textContent=SUBJECTS[subject].topics[topic][1];E.metaLevel.textContent=LEVELS[level][1]+' · '+total+' step';E.dots.innerHTML=Array.from({length:total},(_,i)=>`<span class='dot' id='dot${i}'></span>`).join('');E.fill.style.width='0%';E.chat.innerHTML='';show('exam');await callAI()}
async function callAI(){setLoading(true);typing();try{const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin,subject,topic,level,messages:history})});const data=await res.json();if(!res.ok)throw new Error(data.error||'Errore server '+res.status);removeTyping();const text=data.text||'';if(text.includes('---REPORT---')){const parts=text.split('---REPORT---');if(parts[0].trim())bubble('prof',parts[0].trim());showReport((parts[1]||'').split('---FINE---')[0].trim());return}history.push({role:'assistant',content:text});bubble('prof',text);if(data.advance!==false)advance();E.status.textContent='Scrivi la risposta'}catch(e){removeTyping();bubble('sys',e.message||String(e));E.status.textContent='Errore'}finally{setLoading(false);setTimeout(()=>E.answer.focus(),80)}}
function advance(){step=Math.min(step+1,total);E.fill.style.width=Math.round(step/total*100)+'%';for(let i=0;i<total;i++){const d=document.getElementById('dot'+i);if(d)d.className='dot '+(i<step-1?'done':i===step-1?'cur':'')}}
function setLoading(on){loading=on;E.send.disabled=on;E.answer.disabled=on;E.status.textContent=on?'Sta scrivendo...':''}
function typing(){const d=document.createElement('div');d.id='typing';d.className='bub prof';d.textContent='La professoressa sta scrivendo...';E.chat.appendChild(d);E.chat.scrollTop=E.chat.scrollHeight}function removeTyping(){const t=document.getElementById('typing');if(t)t.remove()}
function bubble(role,text){const d=document.createElement('div');d.className='bub '+(role==='student'?'stu':role==='sys'?'sys':'prof');d.innerHTML=role==='prof'?`<div class='sender'>Professoressa</div>${esc(text)}`:esc(text);E.chat.appendChild(d);E.chat.scrollTop=E.chat.scrollHeight}
async function sendAnswer(){const text=E.answer.value.trim();if(!text||loading)return;E.answer.value='';bubble('student',text);history.push({role:'user',content:text});await callAI()}function keySend(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAnswer()}}
function showReport(raw){show('report');const r={VOTO:'—','PUNTI FORTI':'','DA MIGLIORARE':'','ERRORI RICORRENTI':'',CONSIGLIO:''};raw.split('\n').forEach(line=>{const i=line.indexOf(':');if(i>0){const k=line.slice(0,i).trim();if(k in r)r[k]=line.slice(i+1).trim()}});E.score.textContent=r.VOTO;E.reportSub.textContent=SUBJECTS[subject].name+' · '+SUBJECTS[subject].topics[topic][1];E.reportBody.innerHTML=['PUNTI FORTI','DA MIGLIORARE','ERRORI RICORRENTI','CONSIGLIO'].map(k=>r[k]?`<div class='rsec'><div class='rlab'>${k}</div><div class='rbody'>${esc(r[k])}</div></div>`:'').join('')}
function goSetup(){history=[];E.answer.value='';setLoading(false);show('setup')}function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
</script>
</body>
</html>
